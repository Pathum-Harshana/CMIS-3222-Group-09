<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AuraHub | Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="auth.css?v=auth-theme-2" />
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card">
      <h1 class="brand">aura<span>hub</span></h1>
      <p class="sub">Sign in and continue your wellbeing journey.</p>

      <div class="tabs">
        <button id="tabLogin" class="tab active" type="button">Sign In</button>
        <button id="tabSignup" class="tab" type="button">Sign Up</button>
      </div>

      <form id="loginForm" class="form active">
        <label>Email Address</label>
        <input id="loginEmail" type="email" placeholder="you@example.com" required />
        <label>Password</label>
        <input id="loginPassword" type="password" placeholder="Enter your password" required />
        <button class="btn primary" type="submit"><i class="fa-solid fa-right-to-bracket"></i> Sign In</button>
        <button id="gotoAdmin" class="btn ghost" type="button"><i class="fa-solid fa-user-shield"></i> Admin Login</button>
      </form>

      <form id="signupForm" class="form">
        <label>Full Name</label>
        <input id="signupName" type="text" placeholder="Your full name" required />
        <label>Email Address</label>
        <input id="signupEmail" type="email" placeholder="you@example.com" required />
        <label>Password (min 6 chars)</label>
        <input id="signupPassword" type="password" minlength="6" placeholder="Create a secure password" required />
        <button class="btn primary" type="submit"><i class="fa-solid fa-user-plus"></i> Create Account</button>
      </form>

      <p id="authMsg" class="msg"></p>
    </section>
  </main>
  <script src="auth.js?v=auth-theme-2"></script>
</body>
</html>
